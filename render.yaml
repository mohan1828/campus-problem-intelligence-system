services:
  # Backend API
  - type: web
    name: campus-intelligence-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: DATABASE_URL
        value: file:./dev.db

      - key: PORT
        value: "3001"

  # Frontend
  - type: web
    name: campus-intelligence-client
    env: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: campus-intelligence-api
          envVarKey: RENDER_EXTERNAL_URL