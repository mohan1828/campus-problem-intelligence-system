services:
  # Backend
  - type: web
    name: campus-intelligence-api
    env: node
    rootDir: server
    buildCommand: npm install && npm run build
    startCommand: npm start

    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1

    envVars:
      - key: DATABASE_URL
        value: file:/data/sqlite.db

      - key: PORT
        value: "3001"

  # Frontend
  - type: static
    name: campus-intelligence-client
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: campus-intelligence-api
          envVarKey: RENDER_EXTERNAL_URL